<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: Zambian orange to deep red -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2410C;stop-opacity:1" />
    </linearGradient>
    <!-- Inner glow gradient -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF7ED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFEDD5;stop-opacity:1" />
    </linearGradient>
    <!-- Subtle shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C2D12" flood-opacity="0.3"/>
    </filter>
    <!-- Inner shadow for depth -->
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="roundRect">
      <rect width="512" height="512" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="512" height="512" rx="120" ry="120" fill="url(#bgGrad)"/>

  <!-- Subtle texture pattern overlay -->
  <rect width="512" height="512" rx="120" ry="120" fill="none" stroke="#FFF" stroke-width="1" opacity="0.08"/>

  <!-- African geometric pattern — subtle top-right corner -->
  <g opacity="0.12" clip-path="url(#roundRect)">
    <polygon points="512,0 512,180 380,0" fill="#FFF"/>
    <polygon points="512,0 512,100 450,0" fill="#FFF"/>
  </g>

  <!-- Bottom-left triangle accent -->
  <g opacity="0.1" clip-path="url(#roundRect)">
    <polygon points="0,512 150,512 0,380" fill="#7C2D12"/>
  </g>

  <!-- Z letter — bold, tilted, Zambia's Z -->
  <g transform="translate(256, 256)" filter="url(#shadow)">
    <!-- Big Z shape made from paths -->
    <path d="M-95,-90 L95,-90 L95,-58 L-40,58 L95,58 L95,90 L-95,90 L-95,58 L40,-58 L-95,-58 Z"
          fill="url(#noteGrad)"
          stroke="rgba(255,255,255,0.2)"
          stroke-width="2"/>
  </g>

  <!-- Music note dot on the Z — adds music identity -->
  <circle cx="340" cy="158" r="28" fill="#FFF7ED" opacity="0.9"/>
  <circle cx="340" cy="158" r="18" fill="#F97316"/>

  <!-- Sound waves emanating from right side — music symbol -->
  <g stroke="#FFF7ED" stroke-linecap="round" fill="none" opacity="0.75">
    <path d="M370,220 Q400,256 370,292" stroke-width="10"/>
    <path d="M395,198 Q440,256 395,314" stroke-width="9"/>
  </g>

  <!-- Bottom text: ZED -->
  <text x="256" y="450"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="52"
        fill="#FFF7ED"
        text-anchor="middle"
        letter-spacing="12"
        opacity="0.85">BEATS</text>

  <!-- Subtle bottom border line -->
  <line x1="120" y1="478" x2="392" y2="478" stroke="#FFF7ED" stroke-width="2" opacity="0.3"/>
</svg>
